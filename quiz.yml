  # ===============================
  # image-4taku-h2: 大画像＋4択
  # ===============================
  - title: "大画像＋4択テスト"
    layout:
      type: "select"
      mini-title: "この花は？"
      large-image: "images/himawari.jpg"
    selections:
      1: "ひまわり"
      2: "バラ"
      3: "チューリップ"
      4: "コスモス"
    answer:
      answer: [1]

  # ===============================
  # 前フリ付き: テキスト4択
  # ===============================
  - title: "前フリ付きテスト"
    lead-in:
      text: "ひまわり"
      image: "images/himawari.jpg"
    layout:
      type: "select"
      mini-title: "この花は？"
    selections:
      1: "ひまわり"
      2: "バラ"
      3: "チューリップ"
      4: "コスモス"
    answer:
      answer: [1]
      caption:
        1: "*ひまわり*はキク科の一年草"
        2: "バラはバラ科の植物"
        3: "チューリップはユリ科の球根植物"
        4: "コスモスはキク科の一年草"

  # ===============================
  # 前フリ付き: 複数行テキスト
  # ===============================
  - title: "前フリ複数行テスト"
    lead-in:
      text:
        - "これは何でしょう？"
        - "ヒント: 夏の花"
      image: "images/himawari-land.jpg"
    layout:
      type: "select"
      mini-title: "この花は？"
    selections:
      1: "ひまわり"
      2: "バラ"
      3: "チューリップ"
      4: "コスモス"
    answer:
      answer: [1]


  # ===============================
  # 解説付き: 画像4択
  # ===============================
  - title: "画像4択＋解説テスト"
    layout:
      type: "select"
      mini-title: "テニスはどれ？"
    selections:
      1: ["images/baseball.png", "野球"]
      2: ["images/soccer.png", "サッカー"]
      3: ["images/tennis.png", "テニス"]
      4: ["images/swimming.png", "水泳"]
    answer:
      answer: [3]
      caption:
        1: "野球は*9人*でプレー"
        2: "サッカーは*11人*でプレー"
        3: "*テニス*はラケットを使う競技"
        4: "水泳は*プール*で行う競技"

  # ===============================
  # 解説付き: 画像4択（キャプション付き選択肢）
  # ===============================
  - title: "画像4択キャプション＋解説テスト"
    layout:
      type: "select"
      mini-title: "王冠はどれ？"
      large-image: "images/crown.png"
    selections:
      1: "images/baseball.png"
      2: "images/soccer.png"
      3: "images/crown.png"
      4: "images/tennis.png"
    answer:
      answer: [3]
      caption:
        1: "野球のボール"
        2: "サッカーボール"
        3: "*王冠*が正解！"
        4: "テニスラケット"

  # ===============================
  # 並び替えクイズ: テキスト4択
  # ===============================
  - title: "並び替えクイズ（テキスト）"
    time_limit: 15
    layout:
      type: "sort"
      mini-title: "速い順に並べよう！"
    selections:
      1: "チーター"
      2: "馬"
      3: "人間"
      4: "カメ"
    answer:
      answer: [1, 2, 3, 4]
      caption:
        1: "最速！約110km/h"
        2: "約70km/h"
        3: "約37km/h（短距離）"
        4: "約0.3km/h"

  # ===============================
  # 並び替えクイズ: 画像4択
  # ===============================
  - title: "並び替えクイズ（画像）"
    time_limit: 15
    layout:
      type: "sort"
      mini-title: "好きな順に並べよう！"
    selections:
      1: ["images/baseball.png", "野球"]
      2: ["images/soccer.png", "サッカー"]
      3: ["images/tennis.png", "テニス"]
      4: ["images/swimming.png", "水泳"]
    answer:
      answer: [3, 1, 4, 2]
      caption:
        3: "*テニス*が1位！"
        1: "野球は2位"
        4: "水泳は3位"
        2: "サッカーは4位"

  # ===============================
  # ボーナスクイズ（チャンピオン答え合わせ）
  # layout.type: bonus / API: champion + last_aggregate
  # ===============================
  - title: "ボーナスクイズ"
    time_limit: 15
    layout:
      type: "bonus"
      mini-title: "高い順に並べて"
    selections:
      1: "台北101"
      2: "東京スカイツリー"
      3: "東京タワー"
      4: "あべのハルカス"
    answer:
      answer: [2, 1, 3, 4]
      caption:
        2: "634m・世界一だった"
        1: "509.2m"
        3: "333m"
        4: "300m"

  # ===============================
  # ボーナスクイズ: 画像4択
  # ===============================
  - title: "ボーナスクイズ（画像）"
    time_limit: 15
    layout:
      type: "bonus"
      mini-title: "好きな順に並べよう！"
    selections:
      1: ["images/baseball.png", "野球"]
      2: ["images/soccer.png", "サッカー"]
      3: ["images/tennis.png", "テニス"]
      4: ["images/swimming.png", "水泳"]
    answer:
      answer: [3, 1, 4, 2]
      caption:
        3: "*テニス*が1位！"
        1: "野球は2位"
        4: "水泳は3位"
        2: "サッカーは4位"
