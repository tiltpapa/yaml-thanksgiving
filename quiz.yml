  # image-6taku: 画像6択（キャプション付き）
  # ===============================
  - title: "画像6択キャプション付き"
    layout:
      type: "select"
      mini-title: "好きなものは？"
    selections:
      1: ["images/baseball.png", "野球"]
      2: ["images/soccer.png", "サッカー"]
      3: ["images/tennis.png", "テニス"]
      4: ["images/swimming.png", "水泳"]
      5: ["images/crown.png", "王冠"]
      6: ["images/baseball.png", "野球2"]
