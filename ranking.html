<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランキング</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ranking.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=LINE+Seed+JP&display=swap');
    </style>
</head>
<body>
    <div id="slide-container" class="slide-container">
        <div id="current-slide" class="slide"></div>
    </div>

    <div id="ranking-hint" class="ranking-hint">
        <span>1: 問題ランキング</span>
        <span>2: ピリオドランキング</span>
        <span>3: 総合ランキング</span>
        <span>R: 再取得</span>
        <span>← →: ページ切替</span>
    </div>

    <script type="module">
        import { QuaggaApiClient } from './src/quagga-api.js';
        import { renderRankingSlide } from './src/result-renderer.js';

        // config.js が存在しない場合のフォールバック
        let config;
        try {
            ({ config } = await import('./config.js'));
        } catch {
            console.warn('config.js が見つかりません。デバッグモードで起動します。');
            config = { token: '', eventId: '1', debugMode: true, countOneScreen: 10 };
        }

        const api = new QuaggaApiClient(config);
        const container = document.getElementById('current-slide');

        // ページネーション状態
        let pages = [];
        let pageIndex = 0;

        function showPage(index) {
            if (pages.length === 0) return;
            pageIndex = Math.max(0, Math.min(index, pages.length - 1));
            container.innerHTML = '';
            container.appendChild(pages[pageIndex]);
        }

        function buildPages(title, results) {
            const limit = config.countOneScreen ?? 10;
            pages = [];
            pageIndex = 0;

            if (results.length === 0) {
                pages.push(renderRankingSlide(title, [], { limit }));
                showPage(0);
                return;
            }

            // limit 件ずつ分割
            for (let i = 0; i < results.length; i += limit) {
                const slice = results.slice(i, i + limit);
                const page = renderRankingSlide(
                    `${title}${results.length > limit ? ` (${Math.floor(i / limit) + 1}/${Math.ceil(results.length / limit)})` : ''}`,
                    slice,
                    { limit }
                );
                pages.push(page);
            }

            showPage(0);
        }

        async function loadQuestionRanking() {
            try {
                const data = await api.getLastAggregate();
                const answers = data.answers ?? [];

                // タイム昇順でソート → rank 付与
                answers.sort((a, b) => parseFloat(a.time) - parseFloat(b.time));
                let currentRank = 1;
                const results = answers.map((a, i) => {
                    if (i > 0 && a.time !== answers[i - 1].time) currentRank = i + 1;
                    return { rank: currentRank, point: a.point, time: a.time, member: a.member };
                });

                buildPages('問題ランキング', results);
            } catch (e) {
                showError(e);
            }
        }

        async function loadPeriodRanking() {
            try {
                const data = await api.getPeriodResult();
                buildPages('ピリオドランキング', data.results ?? []);
            } catch (e) {
                showError(e);
            }
        }

        async function loadTotalRanking() {
            try {
                const data = await api.getTotalResult();
                buildPages('総合ランキング', data.results ?? []);
            } catch (e) {
                showError(e);
            }
        }

        function showError(err) {
            container.innerHTML = `<div class="error">取得エラー: ${err.message}</div>`;
        }

        let currentLoader = loadQuestionRanking;

        document.addEventListener('keydown', async (e) => {
            switch (e.key) {
                case '1':
                    currentLoader = loadQuestionRanking;
                    await loadQuestionRanking();
                    break;
                case '2':
                    currentLoader = loadPeriodRanking;
                    await loadPeriodRanking();
                    break;
                case '3':
                    currentLoader = loadTotalRanking;
                    await loadTotalRanking();
                    break;
                case 'r':
                case 'R':
                    await currentLoader();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    showPage(pageIndex + 1);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    showPage(pageIndex - 1);
                    break;
            }
        });

        // 初期表示
        container.innerHTML = '<div class="ranking-slide"><div class="ranking-title">ランキング</div><p class="ranking-empty">1〜3キーでデータを取得</p></div>';
    </script>
</body>
</html>
